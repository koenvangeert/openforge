name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            electron_arch: arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            electron_arch: x64
    timeout-minutes: 20
    runs-on: ${{ matrix.platform }}
    env:
      SOURCE_DATE_EPOCH: "1"
      CARGO_BUILD_TARGET: ${{ matrix.target }}
      npm_config_arch: ${{ matrix.electron_arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve backend layout
        id: backend-layout
        run: echo "backend-crate-root=$(node scripts/rust-sidecar-layout.mjs backend-crate-root)" >> "$GITHUB_OUTPUT"

      - name: Set version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating version to $VERSION"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          CARGO_MANIFEST_PATH="$(node scripts/rust-sidecar-layout.mjs manifest-path)"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" "$CARGO_MANIFEST_PATH"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ steps.backend-layout.outputs.backend-crate-root }} -> target
          cache-bin: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Package Electron app
        run: pnpm electron:package

      - name: Archive Electron app
        run: |
          APP_PATH="$(node scripts/rust-sidecar-layout.mjs electron-app-path)"
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "openforge-${{ matrix.target }}.zip"

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: openforge-${{ matrix.target }}
          path: openforge-${{ matrix.target }}.zip

      - name: Draft GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: Open Forge ${{ github.ref_name }}
          body: |
            See the assets to download and install this version.

            **macOS:** If you see _"Open Forge is damaged and can't be opened"_, run this after copying the app to Applications:
            ```
            xattr -rd com.apple.quarantine /Applications/Open\ Forge.app
            ```
          files: openforge-${{ matrix.target }}.zip
